appId: com.onnx2anything.desktop
productName: ONNX2Anything
copyright: Copyright 2026 ONNX2Anything Team

# Output directories
directories:
  output: release
  buildResources: resources

# Files to include
files:
  - dist/**/*
  - "!dist/renderer/**/*"
  - "!node_modules/**/*"

# Extra resources (renderer + native runners)
extraResources:
  - from: dist/renderer
    to: renderer
    filter:
      - "**/*"
  - from: ../../scripts/native-runners
    to: native-runners
    filter:
      - "**/*"
      - "!*.cpp"
      - "!*.hpp"

# macOS configuration
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: resources/icon.icns
  darkModeSupport: true
  hardenedRuntime: false
  gatekeeperAssess: false
  # Unsigned for now – signing configured later
  identity: null

dmg:
  title: ONNX2Anything
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

# Explicitly exclude GPU-bound backends from bundle
extraFiles: []
